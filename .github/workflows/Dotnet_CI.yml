name: CI .NET - DatingApp

on:
  push:
    branches:
    - Develop
  pull_request:
    branches:
    - main
  workflow_dispatch:
  
jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Install Maui workloads
      run: dotnet workload restore LoveMatch/ProfileApiTim/ProfileApiTim.csproj
    - name: Restore dependencies
      run: dotnet restore LoveMatch/ProfileApiTim/ProfileApiTim.csproj
    - name: Build
      run: dotnet build LoveMatch/ProfileApiTim/ProfileApiTim.csproj --no-restore --configuration Release
    - name: Test
      run: dotnet test LoveMatch/ProfileApiTim/ProfileApiTim.csproj --no-build --configuration Release --verbosity normal
 
